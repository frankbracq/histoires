<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>histoir.es — Chronologie de l'Histoire de France</title>
    <meta name="description" content="Explorez l'histoire de France de Clovis à nos jours : événements, dirigeants, guerres, sciences, culture.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">histoir<span class="logo-dot">.es</span></a>
            <div class="header-search">
                <i class="bi bi-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher..." autocomplete="off">
            </div>
            <button class="filter-toggle" id="filterToggle" title="Filtres">
                <i class="bi bi-funnel"></i>
            </button>
            <span class="header-count" id="eventCount"></span>
        </div>
    </header>

    <!-- Timeline bar -->
    <section class="timeline-section">
        <!-- Century selector -->
        <nav class="century-bar" id="centuryBar">
            <!-- Populated by JS -->
        </nav>

        <!-- Horizontal scrollable timeline -->
        <div class="timeline-wrapper">
            <button class="tl-nav tl-nav-left" id="tlNavLeft"><i class="bi bi-chevron-left"></i></button>
            <div class="timeline-viewport" id="timelineViewport">
                <div class="timeline-scroll" id="timelineScroll">
                    <!-- Leaders band -->
                    <div class="tl-band tl-leaders" id="leadersBand"></div>
                    <!-- Wars band -->
                    <div class="tl-band tl-wars" id="warsBand"></div>
                    <!-- Period markers -->
                    <div class="tl-periods" id="periodMarkers"></div>
                </div>
            </div>
            <button class="tl-nav tl-nav-right" id="tlNavRight"><i class="bi bi-chevron-right"></i></button>
        </div>
    </section>

    <!-- Year pills (sub-navigation within selected 5-year period) -->
    <nav class="year-pills-bar">
        <div class="year-pills" id="yearPills">
            <!-- Populated by JS -->
        </div>
    </nav>

    <!-- Offcanvas filters -->
    <div class="offcanvas-overlay" id="offcanvasOverlay"></div>
    <aside class="offcanvas-panel" id="offcanvasPanel">
        <div class="offcanvas-header">
            <h3>Filtres</h3>
            <button class="offcanvas-close" id="offcanvasClose"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="offcanvas-body">
            <h4>Catégories</h4>
            <div id="categoryFilters"></div>
            <h4>Portée</h4>
            <div id="scopeFilters"></div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main-content">
        <section class="events-panel">
            <div class="events-header">
                <h2 id="periodTitle">Chargement...</h2>
                <span class="events-count" id="filteredCount"></span>
            </div>
            <div class="events-grid" id="eventsGrid">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <p>histoir.es — Données issues de sources historiques et Wikipedia</p>
    </footer>

    <script src="/assets/js/app.js" type="module"></script>
</body>
</html>
